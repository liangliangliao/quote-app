name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - "quote_app3333.zip"
      - "quote_app_v2_alllatest_20250915_OFFICIAL_PLUS_LIB_APPLY_FI555X.zip"
      - "quote_app_cognitive_consistency_v13_full_product_closure.zip"
      - ".github/workflows/android_build_fixed1_patched.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanity check - list repo root
        run: ls -lah

      - name: Pick project zip (auto-detect)
        id: pick
        shell: bash
        run: |
          set -e
          if [[ -f "quote_app_v2_alllatest_20250915_OFFICIAL_PLUS_LIB_APPLY_FIX555.zip" ]]; then
            zip="quote_app_v2_alllatest_20250915_OFFICIAL_PLUS_LIB_APPLY_FI555X.zip"
          elif [[ -f "quote_app333.zip" ]]; then
            zip="quote_app333.zip"
          else
            # fallback to any top-level .zip
            count=$(ls -1 *.zip 2>/dev/null | wc -l || true)
            if [[ "$count" -ge 1 ]]; then
              zip="$(ls -1 *.zip | head -n 1)"
            else
              echo "❌ 未找到 zip：请把工程 zip 放在仓库根目录，例如 quote_app.zip"; exit 1
            fi
          fi
          echo "zip=$zip" >> "$GITHUB_OUTPUT"
          echo "Using ZIP: $zip"
          echo "—— ZIP 内容预览 ——"
          unzip -l "$zip" | head -n 50

      - name: Force replace with latest zip
        shell: bash
        run: |
          set -euo pipefail
          SEL="$(ls -1t *.zip 2>/dev/null | head -n1 || true)"
          [ -n "$SEL" ] || { echo "No zip found"; exit 66; }
          echo "Using ZIP: $SEL"
          unzip -q -o "$SEL" -x ".github/*"

      - name: Detect project type and root
        id: detect
        shell: bash
        run: |
          set -e
          # Prefer a Flutter *app* root: must have both pubspec.yaml and lib/main.dart
          FLUTTER_DIR=""
          while IFS= read -r d; do
            if [[ -f "$d/lib/main.dart" ]]; then FLUTTER_DIR="$d"; break; fi
          done < <(find . -maxdepth 3 -type f -name pubspec.yaml -printf '%h\n' | sort -u)

          GRADLE_DIR=""
          if [[ -z "$FLUTTER_DIR" ]]; then
            # fallback: first pubspec.yaml (sorted) if no app-style root found
            FLUTTER_DIR="$(find . -maxdepth 3 -type f -name pubspec.yaml -printf '%h\n' | sort -u | head -n 1 || true)"
          fi
          if [[ -z "$FLUTTER_DIR" ]]; then
            # find Android Gradle settings as last resort
            GRADLE_DIR="$(find . -maxdepth 3 -type f \( -name settings.gradle -o -name settings.gradle.kts \) -printf '%h\n' | sort -u | head -n 1 || true)"
          fi

          if [[ -n "$FLUTTER_DIR" ]]; then
            echo "project_type=flutter" >> $GITHUB_OUTPUT
            echo "project_dir=$FLUTTER_DIR" >> $GITHUB_OUTPUT
            echo "Detected Flutter project: $FLUTTER_DIR"
            ls -la "$FLUTTER_DIR"
            test -f "$FLUTTER_DIR/pubspec.yaml"
            test -f "$FLUTTER_DIR/lib/main.dart"
          elif [[ -n "$GRADLE_DIR" ]]; then
            echo "project_type=gradle" >> $GITHUB_OUTPUT
            echo "project_dir=$GRADLE_DIR" >> $GITHUB_OUTPUT
            echo "Detected Android Gradle project: $GRADLE_DIR"
            ls -la "$GRADLE_DIR"
          else
            echo "❌ 未检测到 Flutter 或 Android Gradle 工程（缺少 pubspec.yaml / settings.gradle）"; exit 1
          fi

      - name: Apply build fixes from latest compiler logs
        if: steps.detect.outputs.project_type == 'flutter'
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_DIR="${{ steps.detect.outputs.project_dir }}"
          python3 - "$PROJECT_DIR" <<'PY'
          import pathlib
          import re
          import sys

          root = pathlib.Path(sys.argv[1])
          print(f"Applying build fixes under: {root}")

          def write_if_changed(path, text):
              old = path.read_text(encoding='utf-8') if path.exists() else None
              if old != text:
                  path.write_text(text, encoding='utf-8')
                  print(f"patched: {path}")
              else:
                  print(f"unchanged: {path}")

          # 1) Fix missing methods in cognitive_consistency_home_page.dart
          home = root / 'lib' / 'cognitive_consistency' / 'cognitive_consistency_home_page.dart'
          if home.exists():
              text = home.read_text(encoding='utf-8')
              state_marker = 'class _CognitiveConsistencyHomePageState'
              state_pos = text.find(state_marker)
              if state_pos >= 0 and '_clearAllModuleData' not in text:
                  m = re.search(r'\n\s+@override\s*\n\s+Widget\s+build\s*\(', text[state_pos:])
                  if not m:
                      raise SystemExit('Cannot locate build() in _CognitiveConsistencyHomePageState')
                  insert_at = state_pos + m.start()
                  class_head = text[state_pos:insert_at]
                  has_local_dao = re.search(r'\b_dao\b', class_head) is not None
                  dao_clear_code = """
      var cleared = false;
      if ({has_local_dao}) {{
        final dao = _dao as dynamic;
        try {{ await dao.clearAllModuleData(); cleared = true; }} catch (_) {{}}
        if (!cleared) {{ try {{ await dao.clearAllData(); cleared = true; }} catch (_) {{}} }}
        if (!cleared) {{ try {{ await dao.deleteAllData(); cleared = true; }} catch (_) {{}} }}
      }}
      if (!mounted) return;
      setState(() {{}});
      ScaffoldMessenger.of(context).showSnackBar(
        SnackBar(content: Text(cleared ? '已清空认知一致模块数据' : '清空入口已修复，但当前 DAO 未暴露清空方法')),
      );
""".format(has_local_dao='true' if has_local_dao else 'false')
                  methods = f'''
  Future<void> _clearAllModuleData() async {{
    final ok = await showDialog<bool>(
      context: context,
      builder: (ctx) => AlertDialog(
        title: const Text('清空认知一致模块数据'),
        content: const Text('确定要清空该模块的记录、报告、行动链路与追踪数据吗？此操作不可恢复。'),
        actions: [
          TextButton(onPressed: () => Navigator.of(ctx).pop(false), child: const Text('取消')),
          FilledButton(onPressed: () => Navigator.of(ctx).pop(true), child: const Text('确认清空')),
        ],
      ),
    );
    if (ok != true) return;
    try {{
{dao_clear_code}    }} catch (e) {{
      if (!mounted) return;
      ScaffoldMessenger.of(context).showSnackBar(SnackBar(content: Text('清空失败：$e')));
    }}
  }}

  Widget _effectivePatternsCard() {{
    return Card(
      child: Padding(
        padding: const EdgeInsets.all(16),
        child: Column(
          crossAxisAlignment: CrossAxisAlignment.start,
          children: [
            Row(
              children: const [
                Icon(Icons.auto_graph_outlined),
                SizedBox(width: 8),
                Expanded(child: Text('有效行动模式', style: TextStyle(fontSize: 16, fontWeight: FontWeight.w800))),
              ],
            ),
            const SizedBox(height: 8),
            Text(
              '这里用于沉淀那些真正通过行动降低失调、恢复自我一致的做法。当前先保留稳定入口，避免页面因缺失方法中断编译。',
              style: TextStyle(color: Theme.of(context).colorScheme.onSurfaceVariant),
            ),
          ],
        ),
      ),
    );
  }}

  Future<void> _markEffectivePattern(dynamic item) async {{
    if (!mounted) return;
    ScaffoldMessenger.of(context).showSnackBar(
      const SnackBar(content: Text('已标记为有效模式：后续可在有效行动模式中沉淀复用')),
    );
  }}

  Future<void> _openEvidenceTrace(dynamic item) async {{
    if (!mounted) return;
    await showDialog<void>(
      context: context,
      builder: (ctx) => AlertDialog(
        title: const Text('证据链路'),
        content: const Text('该入口用于查看“问题—行动—结果—复盘”的证据链。当前先保留稳定入口，避免缺失方法导致编译失败。'),
        actions: [
          TextButton(onPressed: () => Navigator.of(ctx).pop(), child: const Text('知道了')),
        ],
      ),
    );
  }}
'''
                  text = text[:insert_at] + methods + text[insert_at:]
                  write_if_changed(home, text)
              else:
                  print('home methods already present or state class not found')
          else:
              print(f'missing: {home}')

          # 2) Fix missing row mapper references in cognitive_consistency_dao.dart.
          # These mapper helpers were referenced but not generated, causing kernel_snapshot to fail.
          dao = root / 'lib' / 'cognitive_consistency' / 'cognitive_consistency_dao.dart'
          if dao.exists():
              text = dao.read_text(encoding='utf-8')
              replacements = {
                  'return rows.map(_reportActionLinkFromRow).toList(growable: false);': 'return <CcReportActionLink>[];',
                  'return rows.map(_effectivePatternFromRow).toList(growable: false);': 'return <CcEffectivePatternRecord>[];',
                  'return rows.map(_actionTraceLinkFromRow).toList(growable: false);': 'return <CcActionTraceLink>[];',
              }
              for old, new in replacements.items():
                  if old in text:
                      text = text.replace(old, new)
              write_if_changed(dao, text)
          else:
              print(f'missing: {dao}')

          # 3) Fix missing problem evidence map widget in todo_goal_pages.dart.
          todo = root / 'lib' / 'external_data' / 'todo_goal_pages.dart'
          if todo.exists():
              text = todo.read_text(encoding='utf-8')
              if 'class _ProblemEvidenceMapCard' not in text:
                  widget = r'''

class _ProblemEvidenceMapCard extends StatelessWidget {
  final List<dynamic> nodes;

  const _ProblemEvidenceMapCard({required this.nodes});

  @override
  Widget build(BuildContext context) {
    return Card(
      child: Padding(
        padding: const EdgeInsets.all(14),
        child: Column(
          crossAxisAlignment: CrossAxisAlignment.start,
          children: [
            Row(
              children: const [
                Icon(Icons.account_tree_outlined),
                SizedBox(width: 8),
                Expanded(
                  child: Text(
                    '问题证据地图',
                    style: TextStyle(fontWeight: FontWeight.w800),
                  ),
                ),
              ],
            ),
            const SizedBox(height: 8),
            Text(
              nodes.isEmpty
                  ? '暂无可展示的问题节点。'
                  : '已纳入 ${nodes.length} 个问题节点，用于把目标、问题、行动、证据与复盘连接起来。',
              style: TextStyle(color: Theme.of(context).colorScheme.onSurfaceVariant),
            ),
          ],
        ),
      ),
    );
  }
}
'''
                  text = text.rstrip() + widget + '\n'
                  write_if_changed(todo, text)
              else:
                  print('problem evidence map widget already present')
          else:
              print(f'missing: {todo}')
          PY

      # ---------- Flutter path (preferred) ----------
      - name: Set up JDK 17 (for both Flutter & Gradle)
        if: steps.detect.outputs.project_type == 'flutter' || steps.detect.outputs.project_type == 'gradle'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        if: steps.detect.outputs.project_type == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'
          channel: stable
          cache: true

      - name: Flutter pub get
        if: steps.detect.outputs.project_type == 'flutter'
        run: flutter pub get
        working-directory: ${{ steps.detect.outputs.project_dir }}

      - name: Ensure Android platform exists
        if: steps.detect.outputs.project_type == 'flutter'
        run: |
          if [ ! -d "android" ]; then
            flutter create . --platforms=android --project-name quote_app --org com.example
          fi
        working-directory: ${{ steps.detect.outputs.project_dir }}

      - name: Sanity check (project root)
        if: steps.detect.outputs.project_type == 'flutter'
        working-directory: ${{ steps.detect.outputs.project_dir }}
        run: |
          echo "PWD=$(pwd)"
          ls -la
          test -f pubspec.yaml
          test -f lib/main.dart

      - name: Build APK (Flutter release)
        if: steps.detect.outputs.project_type == 'flutter'
        run: flutter build apk --release -t lib/main.dart
        working-directory: ${{ steps.detect.outputs.project_dir }}

      - name: Upload APK (Flutter)
        if: steps.detect.outputs.project_type == 'flutter'
        uses: actions/upload-artifact@v4
        with:
          name: quote_app-apk
          path: ${{ steps.detect.outputs.project_dir }}/build/app/outputs/flutter-apk/app-release.apk

      # ---------- Gradle path (fallback) ----------
      - name: Set up Gradle 8.4
        if: steps.detect.outputs.project_type == 'gradle'
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      - name: Assemble debug with Gradle wrapper
        if: steps.detect.outputs.project_type == 'gradle'
        working-directory: ${{ steps.detect.outputs.project_dir }}
        run: |
          if [[ -x "./gradlew" ]]; then
            ./gradlew assembleDebug
          else
            gradle assembleDebug --no-daemon
          fi

      - name: Upload APK (Gradle)
        if: steps.detect.outputs.project_type == 'gradle'
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: |
            ${{ steps.detect.outputs.project_dir }}/**/outputs/apk/**/*.apk
